# ============================================================================
# 部署到 GCE VM（拉新映像 + 重啟）
#
# 觸發時機：
#   ① workflow_run：「Build & Push Images」打包成功後「自動」接著部署
#   ② workflow_dispatch：Actions 頁面上的「手動」按鈕也能觸發
#
# 認證：用 repo Secret 「GCP_SA_KEY」（github-deployer 服務帳號金鑰）走 IAP，
#       SSH 進 VM 以使用者 a0987461866 身分跑 docker compose（不開公網 22）。
# ============================================================================
name: Deploy to VM

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    # 自動觸發：只有 build 成功才部署；手動觸發：一律執行
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: 認證 GCP（服務帳號金鑰）
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 安裝 gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: SSH 進 VM → 拉新映像 → 重啟
        run: |
          gcloud compute ssh a0987461866@zonwiki \
            --project=zonwiki-prod \
            --zone=asia-east1-b \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=accept-new" \
            --command="cd /home/a0987461866/zonwiki && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d && docker image prune -f"
