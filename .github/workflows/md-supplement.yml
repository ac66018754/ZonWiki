name: Auto Generate MD Supplement Files

on:
  push:
    branches:
      - origin # 修改为你的主分支名称
    paths:
      - '*.md'
      - '!Programming/**/*_補充.md'  # 不触发补充文件的修改

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-supplements:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 获取完整历史记录
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: '**/*.md'
          files_ignore: '**/*_補充.md'
      
      - name: Install dependencies
        run: npm install axios
      
      - name: Generate supplements
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/generate-supplement.js "${{ steps.changed-files.outputs.all_changed_files }}"
      
      - name: Create Pull Request
        if: hashFiles('.github/scripts/tmp_changes.json') != ''
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'docs: auto-generate MD supplement files'
          title: 'docs: auto-generate MD supplement files'
          body: |
            自動生成的 Markdown 補充文件
            
            這個 PR 根據以下新增/修改的文件自動生成：
            ${{ steps.changed-files.outputs.all_changed_files }}
            
            由 GitHub Actions 自動提交
          branch: docs/md-supplements-${{ github.run_number }}
